name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device model and Android version
      placeholder: "Amazon Fire HD 8, Android 9"
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: kiosk_mode
    attributes:
      label: Kiosk mode
      options:
        - Lock Task Mode
        - Immersive Sticky
        - None
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant adb logcat output
      description: Paste any relevant log output here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: Attach any visual evidence if applicable.
    validations:
      required: false
